<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>customer-spend-api Explorer (minimal)</title>
  <style>body{font-family:sans-serif;margin:2rem}textarea{width:100%;height:6rem}</style>
</head>
<body>
<h1>customer-spend-api API Explorer (minimal)</h1>
<p>Get a token from <code>/demo-token</code> (debug) or your IdP.</p>

<label>Token (Bearer)</label><br>
<input id="token" style="width:100%" placeholder="paste JWT here">

<h3>GraphQL Query</h3>
<textarea id="query">{ recommendations { category suggestedMonthlyBudget ethicsNote dataSources } }</textarea><br>
<button onclick="run()">Run</button>

<pre id="out"></pre>

<script>
async function run() {
  const token = document.getElementById('token').value.trim();
  const q = document.getElementById('query').value;
  const res = await fetch('/graphql', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      ...(token && {'Authorization': 'Bearer ' + token})
    },
    body: JSON.stringify({query: q})
  });
  const json = await res.json();
  document.getElementById('out').textContent = JSON.stringify(json, null, 2);
}
</script>
</body>
</html>
